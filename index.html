<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Simple Circuit — ZK Proof Demo</title>
  <style>
    * { box-sizing: border-box; margin: 0; padding: 0; }

    body {
      background: #0d0d0d;
      color: #e0e0e0;
      font-family: 'Courier New', monospace;
      min-height: 100vh;
      display: flex;
      flex-direction: column;
      align-items: center;
      padding: 48px 16px;
    }

    header {
      text-align: center;
      margin-bottom: 40px;
    }

    header h1 {
      font-size: 2rem;
      color: #a78bfa;
      letter-spacing: 2px;
    }

    header p {
      margin-top: 8px;
      color: #888;
      font-size: 0.9rem;
    }

    .circuit-box {
      background: #161616;
      border: 1px solid #2a2a2a;
      border-radius: 8px;
      padding: 20px 24px;
      margin-bottom: 32px;
      width: 100%;
      max-width: 560px;
    }

    .circuit-box h2 {
      font-size: 0.75rem;
      color: #666;
      text-transform: uppercase;
      letter-spacing: 1px;
      margin-bottom: 12px;
    }

    .circuit-box pre {
      color: #c4b5fd;
      font-size: 0.95rem;
      line-height: 1.6;
    }

    .circuit-box pre .kw  { color: #818cf8; }
    .circuit-box pre .fn  { color: #34d399; }
    .circuit-box pre .pub { color: #f59e0b; }
    .circuit-box pre .str { color: #f87171; }

    form {
      width: 100%;
      max-width: 560px;
      display: flex;
      flex-direction: column;
      gap: 16px;
    }

    .field {
      display: flex;
      flex-direction: column;
      gap: 6px;
    }

    .field label {
      font-size: 0.8rem;
      color: #888;
      text-transform: uppercase;
      letter-spacing: 1px;
    }

    .field label span {
      margin-left: 6px;
      font-size: 0.7rem;
      padding: 2px 6px;
      border-radius: 4px;
    }

    .badge-private { background: #1e1b4b; color: #a78bfa; }
    .badge-public  { background: #1c3426; color: #34d399; }

    .field input {
      background: #1a1a1a;
      border: 1px solid #333;
      border-radius: 6px;
      padding: 10px 14px;
      color: #e0e0e0;
      font-family: 'Courier New', monospace;
      font-size: 1rem;
      outline: none;
      transition: border-color 0.2s;
    }

    .field input:focus { border-color: #a78bfa; }

    .hint {
      font-size: 0.75rem;
      color: #555;
    }

    button {
      margin-top: 8px;
      padding: 12px;
      background: #7c3aed;
      color: #fff;
      border: none;
      border-radius: 6px;
      font-family: 'Courier New', monospace;
      font-size: 1rem;
      cursor: pointer;
      letter-spacing: 1px;
      transition: background 0.2s;
    }

    button:hover:not(:disabled) { background: #6d28d9; }
    button:disabled { background: #3b2568; color: #888; cursor: not-allowed; }

    #result {
      width: 100%;
      max-width: 560px;
      margin-top: 28px;
    }

    .steps { display: flex; flex-direction: column; gap: 10px; }

    .step {
      display: flex;
      align-items: center;
      gap: 12px;
      background: #161616;
      border: 1px solid #2a2a2a;
      border-radius: 6px;
      padding: 12px 16px;
    }

    .step.ok   { border-color: #14532d; }
    .step.fail { border-color: #450a0a; }

    .step-icon { font-size: 1.1rem; min-width: 20px; text-align: center; }
    .step-name { color: #a78bfa; flex: 1; }
    .step-msg  { font-size: 0.8rem; color: #666; }

    .verdict {
      margin-top: 16px;
      padding: 14px 20px;
      border-radius: 6px;
      text-align: center;
      font-size: 1rem;
      letter-spacing: 1px;
    }

    .verdict.success { background: #052e16; color: #4ade80; border: 1px solid #14532d; }
    .verdict.failure { background: #2d0a0a; color: #f87171; border: 1px solid #450a0a; }

    .spinner {
      display: inline-block;
      width: 14px; height: 14px;
      border: 2px solid #555;
      border-top-color: #a78bfa;
      border-radius: 50%;
      animation: spin 0.7s linear infinite;
      vertical-align: middle;
      margin-right: 8px;
    }

    @keyframes spin { to { transform: rotate(360deg); } }

    footer {
      margin-top: 56px;
      font-size: 0.75rem;
      color: #333;
      text-align: center;
    }
  </style>
</head>
<body>

  <header>
    <h1>⚡ ZK Proof Demo - Powered by zkVerify</h1>
    <p>Powered by Noir + Barretenberg &nbsp;·&nbsp; simple_circuit</p>
  </header>

  <div class="circuit-box">
    <h2>Circuit</h2>
    <pre><span class="kw">fn</span> <span class="fn">main</span>(x: Field, y: <span class="pub">pub</span> Field) {
    assert(x == y);
}</pre>
  </div>

  <form id="proofForm">
    <div class="field">
      <label>x <span class="badge-private">private</span></label>
      <input type="text" id="x" placeholder="e.g. 42" autocomplete="off" required />
      <span class="hint">Known only to you — never revealed in the proof</span>
    </div>
    <div class="field">
      <label>y <span class="badge-public">public</span></label>
      <input type="text" id="y" placeholder="e.g. 42" autocomplete="off" required />
      <span class="hint">Public value — must equal x for the proof to pass</span>
    </div>
    <button type="submit" id="btn">Generate &amp; Verify Proof</button>
  </form>

  <div id="result"></div>

  <footer>simple-circuit &nbsp;·&nbsp; khushii &nbsp;·&nbsp; Noir ZK</footer>

  <script>
    const form = document.getElementById("proofForm");
    const btn  = document.getElementById("btn");
    const out  = document.getElementById("result");

    form.addEventListener("submit", async (e) => {
      e.preventDefault();
      const x = document.getElementById("x").value.trim();
      const y = document.getElementById("y").value.trim();

      btn.disabled = true;
      btn.innerHTML = '<span class="spinner"></span>Running proof...';
      out.innerHTML = "";

      try {
        const res = await fetch("/prove", {
          method: "POST",
          headers: { "Content-Type": "application/json" },
          body: JSON.stringify({ x, y }),
        });
        const data = await res.json();
        renderResult(data);
      } catch (err) {
        out.innerHTML = `<div class="verdict failure">Server error: ${err.message}</div>`;
      } finally {
        btn.disabled = false;
        btn.textContent = "Generate & Verify Proof";
      }
    });

    function renderResult(data) {
      const icons = { ok: "✓", fail: "✗" };
      const stepsHtml = data.steps.map(s => `
        <div class="step ${s.status}">
          <span class="step-icon">${icons[s.status]}</span>
          <span class="step-name">${s.name}</span>
          <span class="step-msg">${s.msg}</span>
        </div>
      `).join("");

      const verdictHtml = data.success
        ? `<div class="verdict success">✓ &nbsp; Proof valid — x equals y without revealing x</div>`
        : `<div class="verdict failure">✗ &nbsp; Proof failed — constraint not satisfied</div>`;

      out.innerHTML = `<div class="steps">${stepsHtml}</div>${verdictHtml}`;
    }
  </script>

</body>
</html>
